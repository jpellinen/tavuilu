  <!--
    Wide (1600x900) version of background_example.png. The hill skyline,
    clouds and stars are spread across the full width so that:
      - on a tall/narrow viewport (background-size: cover), only the
        center ~420px-wide column is visible and reproduces the original
        portrait composition (one hill peak, one cloud pair, a few stars);
      - on a wide/landscape viewport, the extra hills, clouds and stars
        toward the edges fill the additional width instead of stretching.
  -->
  <defs
     id="defs9">
    <linearGradient
       id="sky"
       x1="0"
       y1="0"
       x2="0"
       y2="1">
      <stop
