services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - API_URL=http://api:3000
      - CI=true
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - ./shared:/app/shared
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://tavuilu:tavuilu@db:5432/tavuilu
      - CI=true
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
      - ./shared:/app/shared
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=tavuilu
      - POSTGRES_PASSWORD=tavuilu
      - POSTGRES_DB=tavuilu
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavuilu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
