name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  web:
    name: Web (lint / type-check / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm test

  web-e2e:
    name: Web (Playwright E2E)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm playwright

  api:
    name: API (lint / type-check / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tavuilu
          POSTGRES_PASSWORD: tavuilu
          POSTGRES_DB: tavuilu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tavuilu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tavuilu:tavuilu@localhost:5432/tavuilu
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma db push

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm test
