<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="koira">
  <!-- ears (triangular tips, bases hidden behind head) -->
  <path d="M 52 48 L 88 42 L 76 92 Z" fill="#d99a5b"/>
  <path d="M 148 48 L 112 42 L 124 92 Z" fill="#d99a5b"/>
  <!-- tail -->
  <path d="M 150 152 Q 182 148 178 116 Q 168 134 148 144 Z" fill="#d99a5b"/>
  <!-- body -->
  <ellipse cx="100" cy="150" rx="58" ry="44" fill="#e8b27d"/>
  <!-- head -->
  <circle cx="100" cy="86" r="42" fill="#e8b27d"/>
  <!-- snout -->
  <ellipse cx="100" cy="104" rx="22" ry="16" fill="#fff5ec"/>
  <!-- eyes -->
  <circle cx="84" cy="80" r="6" fill="#1c1640"/>
  <circle cx="116" cy="80" r="6" fill="#1c1640"/>
  <!-- nose -->
  <ellipse cx="100" cy="100" rx="8" ry="6" fill="#1c1640"/>
  <!-- mouth -->
  <path d="M 90 111 Q 100 119 110 111" fill="none" stroke="#1c1640" stroke-width="4" stroke-linecap="round"/>
</svg>
